<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <title>Fornecedores - Sweet Cakes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page-scope="admin">
    <div class="admin-container">
        <aside class="sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <h1>🍰 Sweet Cakes</h1>
                <p>Painel Administrativo</p>
            </div>
            <nav class="sidebar-nav" aria-label="Menu principal"></nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button type="button" class="sidebar-toggle btn btn-secondary" aria-expanded="false" aria-controls="admin-sidebar" title="Menu">☰</button>
                    <div>
                        <h2>Fornecedores</h2>
                        <p class="header-subtitle">Empresas e contactos para pedidos de materiais.</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button type="button" id="addFornecedorBtn" class="btn btn-primary">+ Novo fornecedor</button>
                    <button id="refreshBtn" class="btn btn-secondary">🔄 Atualizar</button>
                </div>
            </header>

            <p class="page-intro">
                Empresas que fornecem materiais. Os pedidos em <a href="materiais-stock.html">Materiais</a> entram nas despesas ao marcar como
                <strong>Recebido</strong> com o valor total pago.
            </p>

            <div class="table-wrap">
                <table class="orders-table" id="tblFornecedores">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Empresa</th>
                            <th>Contacto</th>
                            <th>Email</th>
                            <th>Telemóvel</th>
                            <th class="col-actions">Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="fornecedorModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="fornecedorModalTitle">Novo fornecedor</h3>
            <form id="fornecedorForm">
                <input type="hidden" id="fornecedorId">
                <div class="form-group">
                    <label for="fornEmpresa">Empresa *</label>
                    <input type="text" id="fornEmpresa" required maxlength="120">
                </div>
                <div class="form-group">
                    <label for="fornContacto">Nome do contacto</label>
                    <input type="text" id="fornContacto" maxlength="120">
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="fornEmail">Email</label>
                        <input type="email" id="fornEmail" maxlength="120">
                    </div>
                    <div class="form-group">
                        <label for="fornTelemovel">Telemóvel</label>
                        <input type="text" id="fornTelemovel" maxlength="30">
                    </div>
                </div>
                <div class="form-actions modal-footer-actions">
                    <button type="button" id="cancelFornecedorBtn" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="admin-common.js"></script>
    <script src="fornecedores.js"></script>
</body>
</html>
